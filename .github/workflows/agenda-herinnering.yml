name: Agenda herinnering (push 10 min vooraf)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger herinnering endpoint
        run: |
          curl -sS -w "\nHTTP %{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.DASHBOARD_API_KEY }}" \
            "https://dashboard.autronis.nl/api/cron/agenda-herinnering"
